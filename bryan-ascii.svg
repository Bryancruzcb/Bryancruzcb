<svg xmlns="http://www.w3.org/2000/svg" width="628" height="748" viewBox="0 0 628 748" role="img" aria-label="ASCII portrait of Bryan Cruz">
<style>
    .bg   { fill: #f6f8fa; stroke: #d0d7de; }
    text  { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; font-size: 11px;
             fill: #24292f; white-space: pre; }
    .r    { clip-path: inset(0 100% 0 0);
             animation: type 0.34s steps(25, end) forwards; }
    .cur  { fill: #1a7f37; opacity: 0;
             animation: ride 0.34s steps(25, end) forwards,
                        gone .01s linear forwards; }
    @keyframes type { to { clip-path: inset(0 0 0 0); } }
    @keyframes ride {
      from { opacity: 1; transform: translateX(0); }
      to   { opacity: 1; transform: translateX(594px); }
    }
    @keyframes gone { to { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) {
      .r   { animation: none; clip-path: none; }
      .cur { animation: none; opacity: 0; }
    }
  </style>
