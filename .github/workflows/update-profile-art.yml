name: Update profile art

"on":
  schedule:
    - cron: "17 6 * * *"   # ~06:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  heatmap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # CI deps only -- requests + beautifulsoup4. The portrait toolchain is
      # local-only; installing it here would pull ~500MB and an ONNX model
      # every single day to run two scripts that never touch it.
      - run: pip install -r scripts/requirements.txt

      # Exits non-zero if GitHub changed the contributions markup, which fails
      # the run and leaves the last-good SVG live rather than committing a
      # blank heatmap over it.
      - run: python scripts/fetch_contributions.py

      - run: python scripts/render_heatmap_svg.py

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh contribution graph [skip ci]"
          file_pattern: "data/contributions.json contrib-heatmap.svg"
